# eval — Docker Compose: Ollama + Squid + OpenClaw + arsguard
# 完整测试环境
# ===================================================================

services:
  # === Ollama 模型服务 ===
  ollama:
    image: ollama/ollama:latest
    container_name: eval-ollama
    networks:
      - eval_net
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === OpenClaw + arsguard ===
  openclaw:
    build:
      context: ../../arsguard/docker/openclaw
      dockerfile: Dockerfile
    container_name: eval-openclaw
    networks:
      - eval_net
    environment:
      - OPENCLAW_PORT=8080
      - ARSGUARD_CONFIG=/arsguard/config/arsguard.yaml
      - ARSGUARD_ENABLED=true
    volumes:
      - ../../arsguard/config:/arsguard/config:ro
      - ../../arsguard/src:/arsguard/plugins:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # === Squid 反向代理（唯一对外入口）===
  squid:
    build:
      context: ../../arsguard/docker/squid
      dockerfile: Dockerfile
    container_name: eval-squid
    networks:
      - eval_net
    ports:
      - "3128:3128"
    volumes:
      - ./squid/http/squid.conf:/etc/squid/squid/http/squid.conf:ro
    depends_on:
      openclaw:
        condition: service_healthy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

networks:
  eval_net:
    driver: bridge

volumes:
  ollama_data:
